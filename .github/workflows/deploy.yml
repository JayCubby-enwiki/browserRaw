name: Setup and Deploy RAW Denoise
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Fix LibRaw Worker and Patch HTML
        run: |
          python -c "
          import urllib.request, os
          CDN = 'https://cdn.jsdelivr.net/npm/libraw-wasm@1.1.2/dist/'
          FILES = ['libraw.js', 'worker.js', 'libraw.wasm', 'index.js']
          for f in FILES: urllib.request.urlretrieve(CDN + f, f)
          
          # Fix Bug 1 & 2: Patch worker.js to await results and stop buffer detachment
          with open('worker.js', 'r') as f: worker = f.read()
          # 1. Add async/await to the message handler
          worker = worker.replace('onmessage = (e) => {', 'onmessage = async (e) => {')
          worker = worker.replace('const c = un[fn](...args);', 'const c = await un[fn](...args);')
          # 2. Remove automatic transfer list to prevent 'detached ArrayBuffer' errors
          worker = worker.replace('const transfer = args.filter(arg => arg instanceof Uint8Array || arg instanceof ArrayBuffer).map(arg => arg instanceof Uint8Array ? arg.buffer : arg);', 'const transfer = [];')
          with open('worker.js', 'w') as f: f.write(worker)

          # Patch index.html to use local files
          with open('index.html', 'r') as f: html = f.read()
          new_html = html.replace(\"const LIBRAW_CDN = 'https://cdn.jsdelivr.net/npm/libraw-wasm@1.1.2/dist/index.js';\", \"const LIBRAW_CDN = './index.js';\")
          with open('index.html', 'w') as f: f.write(new_html)
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add .
          git commit -m "Apply black-image and detached-buffer fixes" || echo "No changes"
          git push
          
