name: Setup and Deploy RAW Denoise
on:
  push:
    branches: [ main ]
  workflow_dispatch: # This allows you to run it manually from the Actions tab
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Patch LibRaw and HTML
        run: |
          python -c "
          import urllib.request, os
          
          # 1. Download fresh copies
          CDN = 'https://cdn.jsdelivr.net/npm/libraw-wasm@1.1.2/dist/'
          FILES = ['libraw.js', 'worker.js', 'libraw.wasm', 'index.js']
          for f in FILES: 
              print(f'Downloading {f}...')
              urllib.request.urlretrieve(CDN + f, f)
          
          # 2. Apply the 'Detached Buffer' Fix to worker.js
          with open('worker.js', 'r') as f: worker = f.read()
          # We force it to wait for async operations and stop transferring the buffer
          worker = worker.replace('onmessage = (e) => {', 'onmessage = async (e) => {')
          worker = worker.replace('const c = un[fn](...args);', 'const c = await un[fn](...args);')
          worker = worker.replace('const transfer = args.filter(arg => arg instanceof Uint8Array || arg instanceof ArrayBuffer).map(arg => arg instanceof Uint8Array ? arg.buffer : arg);', 'const transfer = [];')
          with open('worker.js', 'w') as f: f.write(worker)

          # 3. Patch index.html to use the local files
          with open('index.html', 'r') as f: html = f.read()
          # Use a more flexible search for the CDN string
          old_line = 'const LIBRAW_CDN = \'https://cdn.jsdelivr.net/npm/libraw-wasm@1.1.2/dist/index.js\';'
          new_line = 'const LIBRAW_CDN = \'./index.js\';'
          if old_line in html:
              html = html.replace(old_line, new_line)
          with open('index.html', 'w') as f: f.write(html)
          "

      - name: Force Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add .
          git commit -m "Force patch: fix detached buffer and async worker" || echo "No changes"
          git push
